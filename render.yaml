## SIGINTX — Render deployment manifest
## Render reads this file automatically when you connect the GitHub repo.
## Docs: https://render.com/docs/blueprint-spec
##
## Free-tier setup: single web service + PostgreSQL.
## APScheduler runs in-process (no Redis/Celery required).

services:
  # ── FastAPI backend ──────────────────────────────────────────────────────────
  - type: web
    name: sigintx-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 75
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: AUTH_DISABLED
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sigintx-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "https://sigintx.vercel.app,http://localhost:5173"
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: OTX_API_KEY
        sync: false
      - key: OLLAMA_HOST
        sync: false

# ── PostgreSQL (free tier, 1 GB) ─────────────────────────────────────────────
databases:
  - name: sigintx-db
    databaseName: sigintx
    user: sigintx
    plan: free
