## SIGINTX — Render deployment manifest
## Render reads this file automatically when you connect the GitHub repo.
## Docs: https://render.com/docs/blueprint-spec

services:
  # ── FastAPI backend ──────────────────────────────────────────────────────────
  - type: web
    name: sigintx-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free          # upgrade to starter/standard for always-on
    healthCheckPath: /api/v1/health
    envVars:
      # ── Auth (disabled for public demo) ──────────────────────────────────────
      - key: AUTH_DISABLED
        value: "true"
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random value

      # ── Database — linked to the postgres instance below ───────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: sigintx-db
          property: connectionString

      # ── Redis — linked to the redis instance below ─────────────────────────
      - key: REDIS_URL
        fromService:
          type: redis
          name: sigintx-redis
          property: connectionString

      # ── CORS — set to your Vercel frontend URL after first deploy ──────────
      # Replace the placeholder once you know your Vercel URL.
      - key: ALLOWED_ORIGINS
        value: "https://sigintx.vercel.app,http://localhost:5173"

      # ── Optional AI providers (add in Render dashboard, not here) ─────────
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: OTX_API_KEY
        sync: false

# ── PostgreSQL (free tier, 1 GB) ─────────────────────────────────────────────
databases:
  - name: sigintx-db
    databaseName: sigintx
    user: sigintx
    plan: free

# ── Redis (free tier, 25 MB) ─────────────────────────────────────────────────
# Note: Render's free Redis is ephemeral — data does not persist across restarts.
# Upgrade to "starter" plan for persistence. The app degrades gracefully
# without Redis (falls back to APScheduler in dev mode).
  - type: redis
    name: sigintx-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
