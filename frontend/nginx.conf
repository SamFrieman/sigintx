server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    # Prevent clickjacking
    add_header X-Frame-Options           "DENY"                          always;
    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options    "nosniff"                       always;
    # Legacy XSS filter (belt-and-suspenders for older browsers)
    add_header X-XSS-Protection          "1; mode=block"                 always;
    # Limit referrer information sent to third parties
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # Control which browser features are allowed
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # Content Security Policy — tightened; adjust script-src if you add CDN assets
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' ws: wss:; worker-src blob:; frame-ancestors 'none';" always;
    # Strict-Transport-Security — only active when served over HTTPS
    # Uncomment and set your TLS terminator to forward the header, or add here
    # if nginx handles TLS directly:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        # Stream SSE responses without buffering
        proxy_buffering    off;
        proxy_cache        off;
    }

    # ── WebSocket proxy ───────────────────────────────────────────────────────
    location /ws {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/rss+xml application/atom+xml
        image/svg+xml font/truetype font/opentype;
    gzip_min_length 1024;
}
