version: "3.9"

# ── All secrets are read from a .env file in the project root. ────────────────
# Copy .env.example → .env and fill in every value before running.
# Never commit .env to version control.

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sigintx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       sigintx
      POSTGRES_USER:     ${POSTGRES_USER:-sigintx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sigintx} -d sigintx"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sigintx-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
      --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Backend API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sigintx-api
    restart: unless-stopped
    # Port 8000 is NOT exposed to the host; all traffic routes through nginx.
    expose:
      - "8000"
    volumes:
      - sigintx-db:/app/data
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-sigintx}:${POSTGRES_PASSWORD}@postgres/sigintx
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - AUTH_DISABLED=false
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - OTX_API_KEY=${OTX_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sigintx-worker
    restart: unless-stopped
    command: celery -A celery_app worker --loglevel=info --concurrency=4 -Q celery
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-sigintx}:${POSTGRES_PASSWORD}@postgres/sigintx
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - AUTH_DISABLED=false
      - JWT_SECRET=${JWT_SECRET}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat ───────────────────────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sigintx-beat
    restart: unless-stopped
    command: celery -A celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    volumes:
      - ./backend:/app
      - celery-beat-data:/app/beat
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-sigintx}:${POSTGRES_PASSWORD}@postgres/sigintx
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - redis
      - worker

  # ── Frontend (nginx) ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: sigintx-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
  sigintx-db:
  celery-beat-data:
