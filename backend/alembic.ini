# alembic.ini — SIGINTX v3.0.0
# Generated by alembic init; customised for dual SQLite/PostgreSQL support.

[alembic]
# Path to the alembic scripts directory (relative to this file's location).
script_location = alembic

# Template used to generate migration script filenames.
file_template = %%(rev)s_%%(slug)s

# Timezone to use when rendering the date within the migration file's comment.
timezone = UTC

# Max length of characters to apply to the "slug" field.
truncate_slug_length = 40

# Set to "true" to run the environment during the "revision" command, using
# the actual database to resolve head revision.
revision_environment = false

# Set to "true" to allow .pyc and .pyo files without a source .py file.
sourceless = false

# Version location specification; this defaults to alembic/versions.
version_locations = %(here)s/alembic/versions

# The output encoding used when revision files are written from script.py.mako.
output_encoding = utf-8

# Database URL — read from environment variable, fall back to local SQLite.
# This value is overridden in env.py when DATABASE_URL env var is set.
sqlalchemy.url = sqlite:///./sigintx.db


# ── Logging configuration ─────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
